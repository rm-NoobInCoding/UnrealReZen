name: build

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init CUE4Parse submodule
        shell: bash
        run: git submodule update --init --remote external/CUE4Parse

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore UnrealReZen/UnrealReZen.csproj

      - name: Build
        run: dotnet build UnrealReZen/UnrealReZen.csproj --no-restore --configuration Release

      - name: Publish (win-x64 single file)
        run: >
          dotnet publish UnrealReZen/UnrealReZen.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish/win-x64

      - name: Zip release
        shell: pwsh
        run: |
          $hash = "${{ github.sha }}".Substring(0, 7)
          Compress-Archive -Path publish/win-x64/* -DestinationPath "publish/UnrealReZen-win-x64-$hash.zip"
          echo "ZIP_NAME=UnrealReZen-win-x64-$hash.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnrealReZen-win-x64
          path: publish/${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Publish to GitHub Releases (latest)
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: publish/${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
